name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Supported sandbox hosts:
#
#   | Host           | Artifacts consumed                                       |
#   |----------------|----------------------------------------------------------|
#   | Linux x86_64   | tokimo-linux-rootfs-x86_64.tar.zst                       |
#   | Windows x86_64 | tokimo-linux-kernel-x86_64.tar.zst                       |
#   |                | tokimo-linux-rootfs-x86_64.vhdx.zip                      |
#   | macOS arm64    | tokimo-linux-kernel-arm64.tar.zst                        |
#   |                | tokimo-linux-rootfs-arm64.tar.zst                        |
#
# Therefore:
#   * x86_64 build emits: rootfs.tar.zst, rootfs.vhdx.zip, kernel.tar.zst
#   * arm64  build emits: rootfs.tar.zst, kernel.tar.zst (no Windows arm64)

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (for cross-platform build)
        uses: docker/setup-qemu-action@v3

      - name: Checkout tokimo-package-sandbox (for tokimo-sandbox-init source)
        uses: actions/checkout@v4
        with:
          repository: tokimo-lab/tokimo-package-sandbox
          path: _sandbox

      - name: Build tokimo-sandbox-init (musl static, in-container ${{ matrix.arch }})
        run: |
          case "${{ matrix.arch }}" in
            amd64) DOCKER_PLATFORM=linux/amd64; RUST_TARGET=x86_64-unknown-linux-musl ;;
            arm64) DOCKER_PLATFORM=linux/arm64; RUST_TARGET=aarch64-unknown-linux-musl ;;
          esac
          docker run --rm --platform "$DOCKER_PLATFORM" \
            -v "$PWD/_sandbox:/src" \
            -w /src \
            rust:1.95-slim-bookworm bash -c "
              set -e
              apt-get update -qq
              apt-get install -y -qq musl-tools
              rustup target add $RUST_TARGET
              cargo build --release --target $RUST_TARGET --bin tokimo-sandbox-init
              cp target/$RUST_TARGET/release/tokimo-sandbox-init /src/tokimo-sandbox-init
              chmod +x /src/tokimo-sandbox-init
            "
          mv _sandbox/tokimo-sandbox-init ./tokimo-sandbox-init
          file ./tokimo-sandbox-init
          ls -lh ./tokimo-sandbox-init
          echo "TOKIMO_INIT_BIN=$PWD/tokimo-sandbox-init" >> "$GITHUB_ENV"

      - name: Build TokimoOS (${{ matrix.arch }})
        env:
          TOKIMO_INIT_BIN: ${{ env.TOKIMO_INIT_BIN }}
        run: bash build.sh ${{ matrix.arch }}

      - name: Resolve artifact arch suffix
        id: arch
        run: |
          case "${{ matrix.arch }}" in
            amd64) echo "suffix=x86_64" >> $GITHUB_OUTPUT ;;
            arm64) echo "suffix=arm64"  >> $GITHUB_OUTPUT ;;
          esac

      - name: Package rootfs tarball (Linux host / macOS VZ)
        run: |
          SFX="${{ steps.arch.outputs.suffix }}"
          tar -cpf "tokimo-linux-rootfs-${SFX}.tar" -C "tokimo-os-${{ matrix.arch }}/rootfs" .
          zstd -10 -T0 "tokimo-linux-rootfs-${SFX}.tar" -o "tokimo-linux-rootfs-${SFX}.tar.zst"
          sha256sum "tokimo-linux-rootfs-${SFX}.tar.zst" > "tokimo-linux-rootfs-${SFX}.tar.zst.sha256"
          rm "tokimo-linux-rootfs-${SFX}.tar"

      - name: Package kernel bundle (vmlinuz + initrd; Windows HCS / macOS VZ)
        run: |
          SFX="${{ steps.arch.outputs.suffix }}"
          tar -cpf "tokimo-linux-kernel-${SFX}.tar" -C "tokimo-os-${{ matrix.arch }}" vmlinuz initrd.img
          zstd -10 -T0 "tokimo-linux-kernel-${SFX}.tar" -o "tokimo-linux-kernel-${SFX}.tar.zst"
          sha256sum "tokimo-linux-kernel-${SFX}.tar.zst" > "tokimo-linux-kernel-${SFX}.tar.zst.sha256"
          rm "tokimo-linux-kernel-${SFX}.tar"

      - name: Package rootfs as VHDX (Windows HCS only, x86_64)
        if: matrix.arch == 'amd64'
        run: |
          SFX="${{ steps.arch.outputs.suffix }}"
          ROOTFS_DIR="tokimo-os-${{ matrix.arch }}/rootfs"
          ROOTFS_SIZE=$(sudo du -sm "$ROOTFS_DIR" | cut -f1)
          IMG_SIZE=$((ROOTFS_SIZE + 512))
          echo "rootfs size: ${ROOTFS_SIZE}M, vhdx image: ${IMG_SIZE}M"

          sudo apt-get update -qq && sudo apt-get install -y -qq qemu-utils zip

          qemu-img create -f raw rootfs.img ${IMG_SIZE}M
          mkfs.ext4 -F rootfs.img

          mkdir -p /tmp/rootfs-mnt
          sudo mount -o loop rootfs.img /tmp/rootfs-mnt
          sudo cp -a "$ROOTFS_DIR"/. /tmp/rootfs-mnt/
          sudo umount /tmp/rootfs-mnt

          qemu-img convert -f raw -O vhdx -o subformat=dynamic rootfs.img rootfs.vhdx
          echo "vhdx size: $(du -sh rootfs.vhdx | cut -f1)"

          zip -9 "tokimo-linux-rootfs-${SFX}.vhdx.zip" rootfs.vhdx
          sha256sum "tokimo-linux-rootfs-${SFX}.vhdx.zip" > "tokimo-linux-rootfs-${SFX}.vhdx.zip.sha256"

          rm rootfs.img rootfs.vhdx

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tokimo-linux-${{ steps.arch.outputs.suffix }}
          path: |
            tokimo-linux-rootfs-${{ steps.arch.outputs.suffix }}.tar.zst
            tokimo-linux-rootfs-${{ steps.arch.outputs.suffix }}.tar.zst.sha256
            tokimo-linux-kernel-${{ steps.arch.outputs.suffix }}.tar.zst
            tokimo-linux-kernel-${{ steps.arch.outputs.suffix }}.tar.zst.sha256
            tokimo-linux-rootfs-${{ steps.arch.outputs.suffix }}.vhdx.zip
            tokimo-linux-rootfs-${{ steps.arch.outputs.suffix }}.vhdx.zip.sha256

      - name: Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            tokimo-linux-rootfs-${{ steps.arch.outputs.suffix }}.tar.zst
            tokimo-linux-rootfs-${{ steps.arch.outputs.suffix }}.tar.zst.sha256
            tokimo-linux-kernel-${{ steps.arch.outputs.suffix }}.tar.zst
            tokimo-linux-kernel-${{ steps.arch.outputs.suffix }}.tar.zst.sha256
            tokimo-linux-rootfs-${{ steps.arch.outputs.suffix }}.vhdx.zip
            tokimo-linux-rootfs-${{ steps.arch.outputs.suffix }}.vhdx.zip.sha256
          body: |
            TokimoOS ${{ github.ref_name }}

            A Linux sandbox image (kernel + initrd + Debian rootfs) consumed by
            [tokimo-package-sandbox](https://github.com/tokimo-lab/tokimo-package-sandbox).

            ## Artifacts

            | File | Contents | Consumed by |
            |------|----------|-------------|
            | `tokimo-linux-rootfs-x86_64.tar.zst` | Debian rootfs tarball | Linux x86_64 host (bwrap) |
            | `tokimo-linux-rootfs-arm64.tar.zst`  | Debian rootfs tarball | macOS arm64 host (VZ virtiofs) |
            | `tokimo-linux-rootfs-x86_64.vhdx.zip` | ext4 VHDX disk image | Windows x86_64 host (HCS) |
            | `tokimo-linux-kernel-x86_64.tar.zst` | `vmlinuz` + `initrd.img` | Windows x86_64 host (HCS) |
            | `tokimo-linux-kernel-arm64.tar.zst`  | `vmlinuz` + `initrd.img` | macOS arm64 host (VZ) |

            Each artifact has a matching `.sha256` checksum file.

            ## Supported hosts

            * **Linux x86_64** — `tokimo-linux-rootfs-x86_64.tar.zst`
            * **Windows x86_64** — `tokimo-linux-kernel-x86_64.tar.zst` + `tokimo-linux-rootfs-x86_64.vhdx.zip`
            * **macOS Apple Silicon (arm64)** — `tokimo-linux-kernel-arm64.tar.zst` + `tokimo-linux-rootfs-arm64.tar.zst`
          make_latest: true
