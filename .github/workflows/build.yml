name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (for cross-platform build)
        uses: docker/setup-qemu-action@v3

      - name: Build TokimoOS (${{ matrix.arch }})
        run: bash build.sh ${{ matrix.arch }}

      - name: Package rootfs tarball
        run: |
          tar -cpf tokimo-${{ matrix.arch }}-rootfs.tar -C tokimo-os-${{ matrix.arch }}/rootfs .
          zstd -10 -T0 tokimo-${{ matrix.arch }}-rootfs.tar -o tokimo-${{ matrix.arch }}-rootfs.tar.zst
          sha256sum tokimo-${{ matrix.arch }}-rootfs.tar.zst > sha256sum-tokimo-${{ matrix.arch }}-rootfs.txt
          rm tokimo-${{ matrix.arch }}-rootfs.tar

      - name: Package boot bundle (kernel + initrd)
        run: |
          tar -cpf tokimo-${{ matrix.arch }}-boot.tar -C tokimo-os-${{ matrix.arch }} vmlinuz initrd.img
          zstd -5 -T0 tokimo-${{ matrix.arch }}-boot.tar -o tokimo-${{ matrix.arch }}-boot.tar.zst
          sha256sum tokimo-${{ matrix.arch }}-boot.tar.zst > sha256sum-tokimo-${{ matrix.arch }}-boot.txt
          rm tokimo-${{ matrix.arch }}-boot.tar

      - name: Create VHDX disk image (Windows HCS)
        run: |
          ROOTFS_DIR="tokimo-os-${{ matrix.arch }}/rootfs"
          ROOTFS_SIZE=$(sudo du -sm "$ROOTFS_DIR" | cut -f1)
          IMG_SIZE=$((ROOTFS_SIZE + 512))
          echo "rootfs size: ${ROOTFS_SIZE}M, vhdx image: ${IMG_SIZE}M"

          sudo apt-get update -qq && sudo apt-get install -y -qq qemu-utils zip

          qemu-img create -f raw rootfs.img ${IMG_SIZE}M
          mkfs.ext4 -F rootfs.img

          mkdir -p /tmp/rootfs-mnt
          sudo mount -o loop rootfs.img /tmp/rootfs-mnt
          sudo cp -a "$ROOTFS_DIR"/. /tmp/rootfs-mnt/
          sudo umount /tmp/rootfs-mnt

          qemu-img convert -f raw -O vhdx -o subformat=dynamic rootfs.img rootfs.vhdx
          echo "vhdx size: $(du -sh rootfs.vhdx | cut -f1)"

          zip -9 tokimo-${{ matrix.arch }}-ext4-rootfs.vhdx.zip rootfs.vhdx
          sha256sum tokimo-${{ matrix.arch }}-ext4-rootfs.vhdx.zip > sha256sum-tokimo-${{ matrix.arch }}-ext4-rootfs.txt
          echo "zipped size: $(du -sh tokimo-${{ matrix.arch }}-ext4-rootfs.vhdx.zip | cut -f1)"

          rm rootfs.img rootfs.vhdx

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tokimo-${{ matrix.arch }}
          path: |
            tokimo-${{ matrix.arch }}-boot.tar.zst
            tokimo-${{ matrix.arch }}-rootfs.tar.zst
            tokimo-${{ matrix.arch }}-ext4-rootfs.vhdx.zip
            sha256sum-tokimo-${{ matrix.arch }}-boot.txt
            sha256sum-tokimo-${{ matrix.arch }}-rootfs.txt
            sha256sum-tokimo-${{ matrix.arch }}-ext4-rootfs.txt

      - name: Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            tokimo-${{ matrix.arch }}-boot.tar.zst
            tokimo-${{ matrix.arch }}-rootfs.tar.zst
            tokimo-${{ matrix.arch }}-ext4-rootfs.vhdx.zip
            sha256sum-tokimo-${{ matrix.arch }}-boot.txt
            sha256sum-tokimo-${{ matrix.arch }}-rootfs.txt
            sha256sum-tokimo-${{ matrix.arch }}-ext4-rootfs.txt
          body: |
            TokimoOS ${{ github.ref_name }}

            ## What's included

            | File | Contents |
            |------|----------|
            | `tokimo-{arch}-boot.tar.zst` | Linux kernel + initrd boot payload |
            | `tokimo-{arch}-rootfs.tar.zst` | Debian 13 rootfs tarball |
            | `tokimo-{arch}-ext4-rootfs.vhdx.zip` | Debian 13 rootfs as ext4 VHDX (Windows HCS) |

            ## Architecture

            | File | Arch |
            |------|------|
            | `tokimo-amd64-*` | x86_64 / Intel Mac / Windows x64 |
            | `tokimo-arm64-*` | aarch64 / Apple Silicon / Windows ARM64 |

            ## Quick start

            ```bash
            # Download boot bundle (kernel + initrd)
            curl -LO ${{ github.server_url }}/${{ github.repository }}/releases/download/${{ github.ref_name }}/tokimo-amd64-boot.tar.zst
            zstd -d tokimo-amd64-boot.tar.zst
            tar -xpf tokimo-amd64-boot.tar -C ~/.tokimo/

            # Download rootfs tarball
            curl -LO ${{ github.server_url }}/${{ github.repository }}/releases/download/${{ github.ref_name }}/tokimo-amd64-rootfs.tar.zst
            zstd -d tokimo-amd64-rootfs.tar.zst
            mkdir -p ~/.tokimo/rootfs
            tar -xpf tokimo-amd64-rootfs.tar -C ~/.tokimo/rootfs

            # Or download rootfs VHDX (for Windows HCS)
            curl -LO ${{ github.server_url }}/${{ github.repository }}/releases/download/${{ github.ref_name }}/tokimo-amd64-ext4-rootfs.vhdx.zip
            unzip tokimo-amd64-ext4-rootfs.vhdx.zip
            ```
          make_latest: true
