name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (for cross-platform build)
        uses: docker/setup-qemu-action@v3

      - name: Build TokimoOS (${{ matrix.arch }})
        run: bash build.sh ${{ matrix.arch }}

      - name: Compress rootfs
        run: |
          tar -cpf rootfs.tar -C tokimo-os-${{ matrix.arch }}/rootfs .
          zstd -10 -T0 rootfs.tar -o rootfs-${{ matrix.arch }}.tar.zst
          sha256sum rootfs-${{ matrix.arch }}.tar.zst > sha256sum-rootfs-${{ matrix.arch }}.txt

      - name: Package tokimo-os bundle (kernel + initrd)
        run: |
          tar -cpf tokimo-os-${{ matrix.arch }}.tar -C tokimo-os-${{ matrix.arch }} vmlinuz initrd.img
          zstd -5 -T0 tokimo-os-${{ matrix.arch }}.tar -o tokimo-os-${{ matrix.arch }}.tar.zst
          sha256sum tokimo-os-${{ matrix.arch }}.tar.zst > sha256sum-tokimo-os-${{ matrix.arch }}.txt

      - name: Create VHDX disk image (Windows HCS)
        run: |
          ROOTFS_DIR="tokimo-os-${{ matrix.arch }}/rootfs"
          ROOTFS_SIZE=$(sudo du -sm "$ROOTFS_DIR" | cut -f1)
          IMG_SIZE=$((ROOTFS_SIZE + 512))
          echo "rootfs size: ${ROOTFS_SIZE}M, vhdx image: ${IMG_SIZE}M"

          sudo apt-get update -qq && sudo apt-get install -y -qq qemu-utils zip

          qemu-img create -f raw rootfs-${{ matrix.arch }}.img ${IMG_SIZE}M
          mkfs.ext4 -F rootfs-${{ matrix.arch }}.img

          mkdir -p /tmp/rootfs-mnt
          sudo mount -o loop rootfs-${{ matrix.arch }}.img /tmp/rootfs-mnt
          sudo cp -a "$ROOTFS_DIR"/. /tmp/rootfs-mnt/
          sudo umount /tmp/rootfs-mnt

          qemu-img convert -f raw -O vhdx -o subformat=dynamic rootfs-${{ matrix.arch }}.img rootfs-${{ matrix.arch }}.vhdx
          echo "vhdx size: $(du -sh rootfs-${{ matrix.arch }}.vhdx | cut -f1)"

          zip -9 rootfs-${{ matrix.arch }}.vhdx.zip rootfs-${{ matrix.arch }}.vhdx
          sha256sum rootfs-${{ matrix.arch }}.vhdx.zip > sha256sum-rootfs-vhdx-${{ matrix.arch }}.txt
          echo "zipped size: $(du -sh rootfs-${{ matrix.arch }}.vhdx.zip | cut -f1)"

          rm rootfs-${{ matrix.arch }}.img rootfs-${{ matrix.arch }}.vhdx

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tokimo-os-${{ matrix.arch }}
          path: |
            tokimo-os-${{ matrix.arch }}.tar.zst
            rootfs-${{ matrix.arch }}.tar.zst
            rootfs-${{ matrix.arch }}.vhdx.zip
            sha256sum-tokimo-os-${{ matrix.arch }}.txt
            sha256sum-rootfs-${{ matrix.arch }}.txt
            sha256sum-rootfs-vhdx-${{ matrix.arch }}.txt

      - name: Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            tokimo-os-${{ matrix.arch }}.tar.zst
            rootfs-${{ matrix.arch }}.tar.zst
            rootfs-${{ matrix.arch }}.vhdx.zip
            sha256sum-tokimo-os-${{ matrix.arch }}.txt
            sha256sum-rootfs-${{ matrix.arch }}.txt
            sha256sum-rootfs-vhdx-${{ matrix.arch }}.txt
          body: |
            TokimoOS ${{ github.ref_name }}

            ## What's included

            | File | Contents |
            |------|----------|
            | `tokimo-os-{arch}.tar.zst` | Linux kernel + initrd (for macOS VZ / Windows HCS) |
            | `rootfs-{arch}.tar.zst` | Debian 13 rootfs (for bwrap sandbox / VM chroot) |
            | `rootfs-{arch}.vhdx.zip` | Debian 13 rootfs as ext4 VHDX, zipped (for Windows HCS) |

            ## Architecture

            | File | Arch |
            |------|------|
            | `tokimo-os-amd64.tar.zst` | x86_64 / Intel Mac / Windows x64 |
            | `tokimo-os-arm64.tar.zst` | aarch64 / Apple Silicon |
            | `rootfs-amd64.vhdx.zip` | x86_64 / Windows x64 |
            | `rootfs-arm64.vhdx.zip` | aarch64 / Windows ARM64 |

            ## Quick start

            ```bash
            # Download kernel + initrd bundle
            curl -LO ${{ github.server_url }}/${{ github.repository }}/releases/download/${{ github.ref_name }}/tokimo-os-amd64.tar.zst
            zstd -d tokimo-os-amd64.tar.zst
            tar -xpf tokimo-os-amd64.tar -C ~/.tokimo/

            # Download rootfs (tar.zst)
            curl -LO ${{ github.server_url }}/${{ github.repository }}/releases/download/${{ github.ref_name }}/rootfs-amd64.tar.zst
            zstd -d rootfs-amd64.tar.zst
            mkdir -p ~/.tokimo/rootfs
            tar -xpf rootfs-amd64.tar -C ~/.tokimo/rootfs

            # Or download rootfs VHDX (for Windows HCS)
            curl -LO ${{ github.server_url }}/${{ github.repository }}/releases/download/${{ github.ref_name }}/rootfs-amd64.vhdx.zip
            unzip rootfs-amd64.vhdx.zip
            ```
          make_latest: true
